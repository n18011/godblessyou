apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: godblessyou-prod

resources:
  - ../../base

configMapGenerator:
  - name: frontend-config
    literals:
      - NODE_ENV=production
      - API_URL=http://backend.godblessyou-prod.svc.cluster.local
  - name: backend-config
    literals:
      - NODE_ENV=production
  - name: postgres-config
    literals:
      - POSTGRES_DB=godblessyou

secretGenerator:
  - name: backend-secrets
    literals:
      - DATABASE_URL=postgresql://godblessyou:godblessyou@postgres.godblessyou-prod.svc.cluster.local:5432/godblessyou
      - JWT_SECRET=production-jwt-secret
  - name: postgres-secrets
    literals:
      - POSTGRES_USER=godblessyou
      - POSTGRES_PASSWORD=godblessyou

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: localhost:5000/godblessyou-frontend:prod
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: localhost:5000/godblessyou-backend:prod 